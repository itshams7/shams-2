function selectCategory(){

const category = document.getElementById("categorySelector").value;
const bookSelector = document.getElementById("bookSelector");

if(!category){
  bookSelector.style.display = "none";
  bookSelector.innerHTML = "";
  return;
}

let options = "";

Object.keys(BOOKS).forEach(book=>{
  if(BOOKS[book].category === category){
    options += `<option value="${book}">${book}</option>`;
  }
});

bookSelector.innerHTML = options;
bookSelector.style.display = "block";

}
  
let resetInterval = null;

function startReset(){

if(resetInterval){
  clearInterval(resetInterval);
}

let time = 180;
const timerDisplay = document.getElementById("resetTimer");

timerDisplay.style.display = "block";

function updateTimer(){
  let minutes = Math.floor(time / 60);
  let seconds = time % 60;

  minutes = minutes < 10 ? "0" + minutes : minutes;
  seconds = seconds < 10 ? "0" + seconds : seconds;

  timerDisplay.innerText = `${minutes}:${seconds}`;
}

updateTimer();

resetInterval = setInterval(()=>{

time--;

updateTimer();

if(time < 0){
  clearInterval(resetInterval);
  resetInterval = null;
  timerDisplay.innerText = "Reset Complete.";
}

},1000);

}

  
function generateLaw(){

let allEntries = [];

Object.keys(BOOKS).forEach(book=>{
  BOOKS[book].sections.forEach(section=>{
    section.content.forEach(item=>{

        text: item,
        book: book,
        section: section.title
      });
    });
  });
});

const random = allEntries[Math.floor(Math.random() * allEntries.length)];

const display = document.getElementById("lawDisplay");
display.style.display = "block";

display.innerHTML = `
  <div style="font-size:18px; margin-bottom:10px;">
    ${random.text}
  </div>
  <div style="font-size:13px; color:var(--muted);">
    — ${random.book} | ${random.section}

`;

/* ================= RENDER ================= */

const selector = document.getElementById("bookSelector");
const container = document.getElementById("bookContainer");


function renderBook(){

const selectedBook = BOOKS[selector.value];
let html = `<div class="book-title">${selector.value}</div>`;

selectedBook.sections.forEach(section => {

html += `
<button class="section-button" onclick="toggle(this)">
${section.title}
</button>
<div class="section-content">
`;

if(section.type === "list"){
html += "<ul>";
section.content.forEach(item=>{
html += `<li>${item}</li>`;
});
html += "</ul>";
}

if(section.type === "paragraphs"){
section.content.forEach(p=>{
html += `<p>${p}</p>`;
});
}

html += "</div>";
});

container.innerHTML = html;
}

function toggle(button){

const content = button.nextElementSibling;
const allSections = document.querySelectorAll(".section-content");

allSections.forEach(section=>{
  if(section !== content){
    section.style.maxHeight = null;
    section.style.padding = "0 35px";
  }
});

if(content.style.maxHeight){
  content.style.maxHeight = null;
  content.style.padding = "0 35px";
} else {
  content.style.maxHeight = content.scrollHeight + "px";
  content.style.padding = "25px 35px";
}

}
